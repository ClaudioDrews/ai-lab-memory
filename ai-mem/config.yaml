proxy:
  host: "0.0.0.0"
  port: 8083
  backend_url: "http://localhost:11434"

retrieval:
  collection: "ai_memory"
  top_k: 5
  score_threshold: 0.0
  inject_types: ["doc", "code", "insight", "task", "conversation"]
  reranking:
    enabled: true
    server_url: "http://localhost:8084/v1/rerank"
    model: "qwen3-reranker-0.6b-q8_0.gguf"
    retrieve_multiplier: 4  # Buscar top_k*4 candidatos, rerankeiar para top_k

session:
  redis_host: "localhost"
  redis_port: 6379
  ttl_hours: 24
  max_turns_per_session: 200

consolidation:
  auto: true
  check_interval_minutes: 15
  min_sessions: 3
  vram_threshold_mb: 4096
  embed_server_url: "http://localhost:8081"
  embed_server_startup_timeout_s: 40
  max_retries_before_warn: 3
  log_path: "logs/setup.log"

reasoning:
  providers:
    - name: "gemini"
      model: "gemini-2.5-flash"
      api_key_env: "GEMINI_API_KEY"
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      timeout_s: 20
    - name: "groq"
      model: "llama-3.3-70b-versatile"
      api_key_env: "GROQ_API_KEY"
      base_url: "https://api.groq.com/openai/v1"
      timeout_s: 15
    - name: "nvidia"
      model: "meta/llama-3.3-70b-instruct"
      api_key_env: "NVIDIA_API_KEY"
      base_url: "https://integrate.api.nvidia.com/v1"
      timeout_s: 15
    - name: "mistral"
      model: "mistral-small-latest"
      api_key_env: "MISTRAL_API_KEY"
      base_url: "https://api.mistral.ai/v1"
      timeout_s: 15
    - name: "openrouter"
      model: "google/gemma-3-4b-it:free"
      api_key_env: "OPENROUTER_API_KEY"
      base_url: "https://openrouter.ai/api/v1"
      timeout_s: 20
    - name: "cerebras"
      model: "llama3.1-8b"
      api_key_env: "CEREBRAS_API_KEY"
      base_url: "https://api.cerebras.ai/v1"
      timeout_s: 15

embedding:
  model_path: models/embedding/qwen3-embedding-0.6b-q8_0.gguf
  dimension: 1024
  batch_size: 6
