name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:1.17.0
        ports:
          - 6333:6333
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-mem/requirements.txt
        pip install -r ai-rag/requirements.txt

    - name: Install llama-cpp
      run: |
        sudo apt update
        sudo apt install -y llama-server

    - name: Download models
      run: |
        mkdir -p models/embedding models/reranker
        python -c "
from huggingface_hub import hf_hub_download
hf_hub_download(
    repo_id='Gideon531/Qwen3-Embedding-0.6B-Q8_0-GGUF',
    filename='qwen3-embedding-0.6b-q8_0.gguf',
    local_dir='models/embedding'
)
hf_hub_download(
    repo_id='ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF',
    filename='qwen3-reranker-0.6b-q8_0.gguf',
    local_dir='models/reranker'
)
"

    - name: Initialize Qdrant
      run: |
        curl -X PUT http://localhost:6333/collections/ai_memory \
          -H "Content-Type: application/json" \
          -d '{
            "vectors": {
              "dense": {"size": 1024, "distance": "Cosine"},
              "sparse": {"bm25": {}}
            }
          }'

    - name: Run tests
      run: |
        echo "Running tests..."
        # Add your test commands here
        # Example: pytest tests/
        echo "Tests passed!"

    - name: Check code style
      run: |
        pip install flake8 black
        flake8 ai-mem/ ai-rag/ --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check ai-mem/ ai-rag/
